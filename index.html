<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calculator</title>
    
    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>

<body>

    <div class="calculator">

        <div class="calc-title">
            My Calculator <span class="fruit">🍒</span>
        </div>

        <div id="display">0</div>

        <div class="buttons">

            <button class="num" onclick="pressNumber('7')">7</button>
            <button class="num" onclick="pressNumber('8')">8</button>
            <button class="num" onclick="pressNumber('9')">9</button>
            <button class="op" onclick="pressOperator('/')">÷</button>

            <button class="num" onclick="pressNumber('4')">4</button>
            <button class="num" onclick="pressNumber('5')">5</button>
            <button class="num" onclick="pressNumber('6')">6</button>
            <button class="op" onclick="pressOperator('*')">×</button>

            <button class="num" onclick="pressNumber('1')">1</button>
            <button class="num" onclick="pressNumber('2')">2</button>
            <button class="num" onclick="pressNumber('3')">3</button>
            <button class="op" onclick="pressOperator('-')">−</button>

            <button class="num" onclick="pressNumber('0')">0</button>
            <button class="num" onclick="pressNumber('.')">.</button>
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="op" onclick="pressOperator('+')">+</button>

            <button class="equal" onclick="calculate()">=</button>

        </div>

    </div>
</body>

</html>
